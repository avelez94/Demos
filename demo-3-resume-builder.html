<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftCV — AI Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --card: #1c2333;
    --border: rgba(52,211,153,0.14);
    --emerald: #34d399;
    --emerald-dim: rgba(52,211,153,0.1);
    --emerald-bright: #6ee7b7;
    --slate: #94a3b8;
    --text: #e2e8f0;
    --muted: rgba(226,232,240,0.5);
    --hint: rgba(226,232,240,0.25);
    --amber: #fbbf24;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; }

  .shell { display: flex; height: 100vh; flex-direction: column; }

  header {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--emerald), #059669);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #022c22;
  }
  .logo-name { font-size: 1.05rem; font-weight: 600; }
  .logo-name span { color: var(--emerald); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.1em;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--emerald); text-transform: uppercase;
  }

  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* Input panel */
  .input-panel {
    width: 420px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
    padding: 24px;
  }
  .input-panel::-webkit-scrollbar { width: 3px; }
  .input-panel::-webkit-scrollbar-thumb { background: var(--border); }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--emerald);
    margin-bottom: 12px;
  }

  .field-group { margin-bottom: 20px; }
  .field-label {
    font-size: 0.78rem; font-weight: 500; color: var(--muted);
    margin-bottom: 6px; display: block;
  }
  input[type=text], textarea, select {
    width: 100%; background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; font-weight: 300;
    outline: none; transition: border-color 0.2s;
    resize: none;
  }
  input[type=text]:focus, textarea:focus { border-color: rgba(52,211,153,0.4); }
  textarea { min-height: 80px; }
  input[type=text]::placeholder, textarea::placeholder { color: var(--hint); }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--emerald), #059669);
    color: #022c22; border: none; cursor: pointer;
    padding: 13px 24px; border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-size: 0.92rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 8px;
  }
  .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Preview panel */
  .preview-panel {
    flex: 1; overflow-y: auto;
    background: #1a1a2e;
    padding: 32px;
    display: flex; flex-direction: column; align-items: center;
  }
  .preview-panel::-webkit-scrollbar { width: 4px; }
  .preview-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .preview-toolbar {
    width: 100%; max-width: 680px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .preview-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }
  .download-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--emerald); font-size: 0.78rem; cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: background 0.15s;
  }
  .download-btn:hover { background: var(--emerald-dim); }

  /* Resume document */
  .resume-doc {
    width: 100%; max-width: 680px;
    background: #fff; color: #1a1a2e;
    border-radius: 6px;
    padding: 48px;
    min-height: 400px;
    font-family: 'Georgia', serif;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
  }
  .resume-doc.loading::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.7);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Empty state */
  .empty-doc {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
    padding: 60px 40px; color: #94a3b8;
    gap: 16px;
  }
  .empty-icon { font-size: 3rem; opacity: 0.3; }
  .empty-title { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 500; }
  .empty-sub { font-family: 'Outfit', sans-serif; font-size: 0.82rem; opacity: 0.7; }

  /* Resume styles */
  .r-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid #1a1a2e; }
  .r-name { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; color: #0f172a; font-family: 'Georgia', serif; }
  .r-title { font-size: 1rem; color: #059669; font-weight: 400; margin-top: 4px; font-family: 'Arial', sans-serif; }
  .r-contact { margin-top: 10px; font-size: 0.78rem; color: #64748b; font-family: 'Arial', sans-serif; display: flex; gap: 16px; flex-wrap: wrap; }
  .r-section { margin-bottom: 24px; }
  .r-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #059669; margin-bottom: 12px; font-family: 'Arial', sans-serif; }
  .r-summary { font-size: 0.88rem; line-height: 1.7; color: #334155; font-family: 'Arial', sans-serif; }
  .r-job { margin-bottom: 16px; }
  .r-job-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .r-job-title { font-size: 0.92rem; font-weight: 700; color: #0f172a; font-family: 'Arial', sans-serif; }
  .r-job-date { font-size: 0.75rem; color: #94a3b8; font-family: 'Arial', sans-serif; }
  .r-job-company { font-size: 0.82rem; color: #059669; margin-bottom: 8px; font-family: 'Arial', sans-serif; }
  .r-job ul { padding-left: 16px; }
  .r-job li { font-size: 0.82rem; line-height: 1.6; color: #475569; margin-bottom: 3px; font-family: 'Arial', sans-serif; }
  .r-skills { display: flex; flex-wrap: wrap; gap: 7px; }
  .r-skill { background: #f0fdf4; border: 1px solid #bbf7d0; color: #065f46; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-family: 'Arial', sans-serif; font-weight: 500; }

  /* Loading shimmer */
  .shimmer-line {
    height: 12px; border-radius: 6px;
    background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin-bottom: 10px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .generating-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.92);
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    z-index: 10;
  }
  .gen-spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid #bbf7d0;
    border-top-color: #059669;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gen-text { font-family: 'Outfit', sans-serif; font-size: 0.9rem; color: #059669; font-weight: 500; }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <div class="logo-mark">C</div>
      <div class="logo-name">Craft<span>CV</span></div>
    </div>
    <div class="header-right">
      <div class="badge">AI Powered</div>
    </div>
  </header>

  <div class="workspace">
    <div class="input-panel">
      <div class="section-label">Personal Info</div>

      <div class="field-group">
        <label class="field-label">Full Name</label>
        <input type="text" id="fullName" placeholder="e.g. Jordan Rivera" />
      </div>

      <div class="field-group">
        <label class="field-label">Job Title / Role</label>
        <input type="text" id="jobTitle" placeholder="e.g. Full Stack Developer" />
      </div>

      <div class="field-group">
        <label class="field-label">Email</label>
        <input type="text" id="email" placeholder="you@example.com" />
      </div>

      <div class="field-group">
        <label class="field-label">Location</label>
        <input type="text" id="location" placeholder="e.g. New York, NY" />
      </div>

      <div class="divider"></div>
      <div class="section-label">Experience</div>

      <div class="field-group">
        <label class="field-label">Work History (describe in plain language)</label>
        <textarea id="experience" placeholder="e.g. 3 years as a web developer at a startup building React apps. Before that, 2 years freelancing for local businesses building WordPress sites." rows="4"></textarea>
      </div>

      <div class="field-group">
        <label class="field-label">Key Skills</label>
        <input type="text" id="skills" placeholder="e.g. React, Node.js, Stripe, Supabase, AI" />
      </div>

      <div class="field-group">
        <label class="field-label">Education</label>
        <input type="text" id="education" placeholder="e.g. BS Computer Science, Indiana University, 2021" />
      </div>

      <div class="divider"></div>
      <div class="section-label">Style</div>

      <div class="field-group">
        <label class="field-label">Tone</label>
        <select id="tone">
          <option value="professional">Professional and polished</option>
          <option value="bold">Bold and confident</option>
          <option value="minimal">Clean and minimal</option>
          <option value="creative">Creative and dynamic</option>
        </select>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generateResume()">
        ✨ Generate My Resume
      </button>
    </div>

    <div class="preview-panel">
      <div class="preview-toolbar">
        <div class="preview-label">Resume Preview</div>
        <button class="download-btn" onclick="window.print()">↓ Download PDF</button>
      </div>

      <div class="resume-doc" id="resumeDoc">
        <div class="empty-doc">
          <div class="empty-icon">📄</div>
          <div class="empty-title">Your resume will appear here</div>
          <div class="empty-sub">Fill in your details on the left and click Generate</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  async function generateResume() {
    const name = document.getElementById('fullName').value.trim();
    const title = document.getElementById('jobTitle').value.trim();
    const email = document.getElementById('email').value.trim();
    const location = document.getElementById('location').value.trim();
    const experience = document.getElementById('experience').value.trim();
    const skills = document.getElementById('skills').value.trim();
    const education = document.getElementById('education').value.trim();
    const tone = document.getElementById('tone').value;

    if (!name || !title || !experience) {
      alert('Please fill in at least your name, job title, and work experience.');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;

    const doc = document.getElementById('resumeDoc');
    doc.style.position = 'relative';
    doc.innerHTML = `
      <div class="generating-overlay">
        <div class="gen-spinner"></div>
        <div class="gen-text">Crafting your resume...</div>
      </div>
      <div class="empty-doc" style="opacity:0.2">
        <div class="shimmer-line" style="width:60%"></div>
        <div class="shimmer-line" style="width:40%"></div>
        <div class="shimmer-line" style="width:80%"></div>
      </div>
    `;

    const prompt = `Create a professional resume for the following person. Return ONLY a JSON object with no markdown fences.

Person details:
Name: ${name}
Title: ${title}
Email: ${email || 'Not provided'}
Location: ${location || 'Not provided'}
Experience: ${experience}
Skills: ${skills || 'Not provided'}
Education: ${education || 'Not provided'}
Tone: ${tone}

Return this exact JSON structure:
{
  "name": "Full Name",
  "title": "Job Title",
  "email": "email",
  "location": "location",
  "phone": "555-000-0000",
  "summary": "2-3 sentence professional summary in the requested tone",
  "experience": [
    {
      "title": "Job Title",
      "company": "Company Name",
      "dates": "Year to Year",
      "bullets": ["achievement 1", "achievement 2", "achievement 3"]
    }
  ],
  "skills": ["skill1", "skill2", "skill3"],
  "education": "Degree, School, Year"
}

Make the content compelling, specific, and achievement-focused. Use strong action verbs. No dashes anywhere, use bullets instead.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      const raw = data.content?.[0]?.text || '{}';
      const clean = raw.replace(/```json|```/g, '').trim();
      const resume = JSON.parse(clean);
      renderResume(resume);
    } catch (err) {
      doc.innerHTML = `<div class="empty-doc"><div class="empty-icon">⚠️</div><div class="empty-title">Generation failed</div><div class="empty-sub">Please try again</div></div>`;
    }

    btn.disabled = false;
  }

  function renderResume(r) {
    const doc = document.getElementById('resumeDoc');
    doc.innerHTML = `
      <div class="r-header">
        <div class="r-name">${r.name}</div>
        <div class="r-title">${r.title}</div>
        <div class="r-contact">
          ${r.email ? `<span>✉ ${r.email}</span>` : ''}
          ${r.phone ? `<span>📞 ${r.phone}</span>` : ''}
          ${r.location ? `<span>📍 ${r.location}</span>` : ''}
        </div>
      </div>

      ${r.summary ? `
      <div class="r-section">
        <div class="r-section-title">Summary</div>
        <div class="r-summary">${r.summary}</div>
      </div>` : ''}

      ${r.experience?.length ? `
      <div class="r-section">
        <div class="r-section-title">Experience</div>
        ${r.experience.map(j => `
          <div class="r-job">
            <div class="r-job-header">
              <div class="r-job-title">${j.title}</div>
              <div class="r-job-date">${j.dates}</div>
            </div>
            <div class="r-job-company">${j.company}</div>
            <ul>${(j.bullets || []).map(b => `<li>${b}</li>`).join('')}</ul>
          </div>
        `).join('')}
      </div>` : ''}

      ${r.skills?.length ? `
      <div class="r-section">
        <div class="r-section-title">Skills</div>
        <div class="r-skills">${r.skills.map(s => `<span class="r-skill">${s}</span>`).join('')}</div>
      </div>` : ''}

      ${r.education ? `
      <div class="r-section">
        <div class="r-section-title">Education</div>
        <div class="r-summary">${r.education}</div>
      </div>` : ''}
    `;
  }
</script>
</body>
</html>
